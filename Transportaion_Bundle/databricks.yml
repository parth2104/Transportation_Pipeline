# This is a Databricks asset bundle definition for Transportaion_Bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Transportaion_Bundle
  uuid: 1deaaf7a-40db-4bea-8bdb-aecf866265d0

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-bc666962-a1a7.cloud.databricks.com
    variables:
      catalog: driving
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-bc666962-a1a7.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/barotparth512@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/barotparth512@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: driving
      schema: prod
    permissions:
      - user_name: barotparth512@gmail.com
        level: CAN_MANAGE
