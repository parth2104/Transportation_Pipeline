# The main pipeline for Transportaion_Bundle

resources:
  pipelines:
    Transportaion_Bundle_etl:
      name: Transportaion_Bundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/Transportaion_Bundle_etl"

      libraries:
        - glob:
            include: ../src/Transportaion_Bundle_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
